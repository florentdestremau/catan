<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bg" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#1a2a4e"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.5"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Hexagones de plateau, disposition décorative à droite -->
  <g transform="translate(840,315)" filter="url(#shadow)">
    <g id="hex-cluster">
      <!-- Rangée 1 -->
      <polygon points="-120,-208 -60,-242 0,-208 0,-138 -60,-104 -120,-138" fill="#2d6a2d"/>
      <polygon points="0,-208 60,-242 120,-208 120,-138 60,-104 0,-138" fill="#d4a017"/>
      <!-- Rangée 2 -->
      <polygon points="-180,-104 -120,-138 -60,-104 -60,-34 -120,0 -180,-34" fill="#c0522a"/>
      <polygon points="-60,-104 0,-138 60,-104 60,-34 0,0 -60,-34" fill="#6abf6a"/>
      <polygon points="60,-104 120,-138 180,-104 180,-34 120,0 60,-34" fill="#888"/>
      <!-- Rangée 3 -->
      <polygon points="-240,0 -180,-34 -120,0 -120,70 -180,104 -240,70" fill="#d4a017"/>
      <polygon points="-120,0 -60,-34 0,0 0,70 -60,104 -120,70" fill="#e8d090"/>
      <polygon points="0,0 60,-34 120,0 120,70 60,104 0,70" fill="#2d6a2d"/>
      <polygon points="120,0 180,-34 240,0 240,70 180,104 120,70" fill="#c0522a"/>
      <!-- Rangée 4 -->
      <polygon points="-180,104 -120,70 -60,104 -60,174 -120,208 -180,174" fill="#6abf6a"/>
      <polygon points="-60,104 0,70 60,104 60,174 0,208 -60,174" fill="#888"/>
      <polygon points="60,104 120,70 180,104 180,174 120,208 60,174" fill="#d4a017"/>
      <!-- Rangée 5 -->
      <polygon points="-120,208 -60,174 0,208 0,278 -60,312 -120,278" fill="#2d6a2d"/>
      <polygon points="0,208 60,174 120,208 120,278 60,312 0,278" fill="#6abf6a"/>

      <!-- Jetons de nombre -->
      <g font-family="system-ui, sans-serif" font-weight="bold" text-anchor="middle">
        <circle cx="-60" cy="-173" r="18" fill="#fff8e8"/><text x="-60" y="-166" font-size="18" fill="#222">9</text>
        <circle cx="60"  cy="-173" r="18" fill="#fff8e8"/><text x="60"  y="-166" font-size="18" fill="#c0392b">8</text>
        <circle cx="-120" cy="-69" r="18" fill="#fff8e8"/><text x="-120" y="-62" font-size="18" fill="#222">4</text>
        <circle cx="0"   cy="-69"  r="18" fill="#fff8e8"/><text x="0"   y="-62"  font-size="18" fill="#222">10</text>
        <circle cx="120" cy="-69"  r="18" fill="#fff8e8"/><text x="120" y="-62"  font-size="18" fill="#222">5</text>
        <circle cx="-180" cy="35"  r="18" fill="#fff8e8"/><text x="-180" y="42"  font-size="18" fill="#222">11</text>
        <circle cx="60"  cy="35"   r="18" fill="#fff8e8"/><text x="60"  y="42"   font-size="18" fill="#222">3</text>
        <circle cx="180" cy="35"   r="18" fill="#fff8e8"/><text x="180" y="42"   font-size="18" fill="#c0392b">6</text>
        <circle cx="-120" cy="139" r="18" fill="#fff8e8"/><text x="-120" y="146" font-size="18" fill="#222">2</text>
        <circle cx="0"   cy="139"  r="18" fill="#fff8e8"/><text x="0"   y="146"  font-size="18" fill="#222">12</text>
        <circle cx="120" cy="139"  r="18" fill="#fff8e8"/><text x="120" y="146"  font-size="18" fill="#c0392b">8</text>
        <circle cx="-60" cy="243"  r="18" fill="#fff8e8"/><text x="-60" y="250"  font-size="18" fill="#222">9</text>
        <circle cx="60"  cy="243"  r="18" fill="#fff8e8"/><text x="60"  y="250"  font-size="18" fill="#c0392b">6</text>
      </g>
    </g>
  </g>

  <!-- Texte à gauche -->
  <g font-family="system-ui, sans-serif" fill="#eee">
    <text x="80" y="200" font-size="88" font-weight="bold">🏝️ Catan</text>
    <text x="80" y="260" font-size="36" fill="#e67e22" font-weight="600">Hotseat 2-4 joueurs</text>

    <text x="80" y="350" font-size="26" fill="#cfd8e3">Colons de Catan dans le navigateur.</text>
    <text x="80" y="388" font-size="26" fill="#cfd8e3">Règles complètes + cartes développement.</text>
    <text x="80" y="426" font-size="26" fill="#cfd8e3">Sauvegarde locale, gratuit, sans inscription.</text>

    <text x="80" y="540" font-size="22" fill="#7a8a9a">catan.once.florent.cc</text>
  </g>
</svg>
